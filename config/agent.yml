# 代理配置 (YAML 格式)
# ===================

# 代理唯一标识
agent_id: "台式机"

# OpenClaw 服务器地址
server_url: "ws://127.0.0.1:8765"

# 认证配置
auth:
  # 认证 Token
  token: "test_token"

# 元数据文件路径（相对于项目根目录）
metadata_path: "config/metadata.json"

# 命令开关配置
# 每个命令可以设置 enabled: true/false 来控制开关
# 命令的名称、描述、参数等从 JSON 元数据文件读取
# capabilities 命令始终可用，不受此配置影响
capabilities:
  capabilities: true
  system.info: true
  system.reboot: true
  system.shutdown: true
  process.list: true
  process.stop: true
  software.list: true
  software.search: true
  software.install: true
  software.uninstall: true
  env.list: true
  env.get: true
  env.set: true
  env.delete: true
  file.list: true
  file.read: true
  file.write: true
  file.delete: true
  file.create_dir: true
  file.copy: true
  file.move: true
  file.download: true
  config.get: true
  config.set: true
  shell.execute: true

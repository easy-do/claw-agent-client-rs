name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clean
        run: |
          if (Test-Path target) { Remove-Item -Path target -Recurse -Force }
      - name: Build
        run: |
          cargo build --release --bin claw-agent-client-rs
      - name: Prepare distribution
        run: |
          New-Item -ItemType Directory -Path release -Force
          Copy-Item target/release/claw-agent-client-rs.exe release/
          New-Item -ItemType Directory -Path release/config -Force
          Copy-Item config/agent.yml release/config/
          Copy-Item config/metadata.json release/config/
          Copy-Item scripts/installs/windows_install.bat release/
      - name: Create zip
        run: |
          Compress-Archive -Path release/* -DestinationPath claw-agent-client-rs-windows.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: claw-agent-client-rs-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cargo build --release --bin claw-agent-client-rs
      - name: Prepare distribution
        run: |
          mkdir -p release
          cp target/release/claw-agent-client-rs release/
          mkdir -p release/config
          cp config/agent.yml release/config/
          cp config/metadata.json release/config/
          cp scripts/installs/macos_install.sh release/
      - name: Create zip
        run: |
          zip -r claw-agent-client-rs-macos.zip release/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: claw-agent-client-rs-macos.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Build
        run: |
          cargo build --release --bin claw-agent-client-rs
      - name: Prepare distribution
        run: |
          mkdir -p release
          cp target/release/claw-agent-client-rs release/
          mkdir -p release/config
          cp config/agent.yml release/config/
          cp config/metadata.json release/config/
          cp scripts/installs/linux_install.sh release/
      - name: Create zip
        run: |
          zip -r claw-agent-client-rs-linux.zip release/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: claw-agent-client-rs-linux.zip

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release-assets/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
